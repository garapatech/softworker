{% macro render_item_header(title=None, subtitle=None) -%}
<div class="item-header">
    {% if title %}
    <div class="item-header-title">
        {{ title }}
    </div>
    {% endif %}
    {% if subtitle %}
    <div class="item-header-subtitle">
        {{ subtitle }}
    </div>
    {% endif %}
</div>
{%- endmacro %}
